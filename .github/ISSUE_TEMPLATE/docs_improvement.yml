name: Docs Improvement
description: Suggest an improvement to README, docs, examples, or website copy.
title: '[Docs]: '
labels:
  - documentation
body:
  - type: textarea
    id: page
    attributes:
      label: Which page needs work?
      description: Link the page or file path and describe the current issue.
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: What should change?
      description: Describe the edit, missing content, or unclear section.
    validations:
      required: true

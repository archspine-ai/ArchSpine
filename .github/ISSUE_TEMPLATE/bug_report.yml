name: Bug Report
description: Report a runtime, CLI, MCP, or documentation bug.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do not use public issues for security reports. Follow `SECURITY.md` for private disclosure instructions.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide exact commands, files, or steps to reproduce the issue.
      placeholder: |
        1. Run `spine init`
        2. Run `spine check`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Node.js version, operating system, provider, and any relevant config.
      placeholder: |
        Node.js:
        OS:
        SPINE_PROVIDER:
        CLI version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste CLI output, stack traces, or screenshots if available.

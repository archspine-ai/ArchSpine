<?xml version="1.0" standalone="no"?>
<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#171033" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0B0D17" stop-opacity="0"/>
    </radialGradient>
    <filter id="archspine-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#8B5CF6" flood-opacity="0.4"/>
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="#0B0D17"/>
  <rect width="1600" height="1000" fill="url(#bg-glow)"/>

  <!-- Grid lines -->
  <line x1="100" y1="520" x2="1550" y2="520" stroke="#2B3650" stroke-width="1.5" stroke-dasharray="8 8"/>
  <line x1="583" y1="120" x2="583" y2="920" stroke="#2B3650" stroke-width="1.5" stroke-dasharray="8 8"/>
  <line x1="1066" y1="120" x2="1066" y2="920" stroke="#2B3650" stroke-width="1.5" stroke-dasharray="8 8"/>

  <!-- Axes -->
  <line x1="100" y1="920" x2="1550" y2="920" stroke="#7C8DB5" stroke-width="3"/>
  <polygon points="1550,914 1562,920 1550,926" fill="#7C8DB5"/>
  <line x1="80" y1="900" x2="80" y2="130" stroke="#7C8DB5" stroke-width="3"/>
  <polygon points="74,130 80,118 86,130" fill="#7C8DB5"/>

  <!-- Axis Labels -->
  <text x="825" y="970" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#B8C4FF" letter-spacing="0.5">Degree of Structured Codebase Representation</text>
  <text x="100" y="955" text-anchor="start" font-family="system-ui" font-size="14" fill="#A7B4D6" font-weight="600">Low</text>
  <text x="1550" y="955" text-anchor="end" font-family="system-ui" font-size="14" fill="#A7B4D6" font-weight="600">High</text>

  <text x="40" y="515" transform="rotate(-90 40 515)" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#B8C4FF" letter-spacing="0.5">Alignment with Engineering Workflow</text>
  <text x="65" y="900" text-anchor="end" font-family="system-ui" font-size="14" fill="#A7B4D6" font-weight="600">Far</text>
  <text x="65" y="130" text-anchor="end" font-family="system-ui" font-size="14" fill="#A7B4D6" font-weight="600">Near</text>

  <!-- Title & Subtitle -->
  <text x="800" y="60" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#F8FAFC" letter-spacing="-0.02em">Layered Map of Codebase Understanding in AI Collaboration</text>
  <text x="800" y="92" text-anchor="middle" font-family="system-ui" font-size="17" font-weight="400" fill="#94A3B8">Positioning project instructions, repository context, long-term memory, and structural layers</text>

  <!-- Region Labels -->
  <text x="341" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2" fill="#AEB9D8" textTransform="uppercase">Project Instructions /<tspan x="341" dy="20">Behavioral Constraints</tspan></text>
  <text x="825" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2" fill="#AEB9D8" textTransform="uppercase">Repository Context<tspan x="825" dy="20">Layer</tspan></text>
  <text x="1308" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2" fill="#AEB9D8" textTransform="uppercase">Structured Codebase /<tspan x="1308" dy="20">Architecture Spine Layer</tspan></text>

  <text x="341" y="555" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2" fill="#AEB9D8" textTransform="uppercase">General Memory<tspan x="341" dy="20">Infrastructure</tspan></text>
  <text x="825" y="555" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2" fill="#AEB9D8" textTransform="uppercase">Stateful agents<tspan x="825" dy="20">Memory</tspan></text>
  <text x="1308" y="555" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2" fill="#AEB9D8" textTransform="uppercase">Graph / High-Structure<tspan x="1308" dy="20">Long-Term Memory</tspan></text>

  <!-- Cards -->
  <!-- Top Left: Behavioral Constraints -->
  <g transform="translate(100, 180)">
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">Claude Code Memory</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Editable text memory</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Strong fit with development workflow</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Low structure</text>
  </g>

  <g transform="translate(395, 330)"> <!-- Moved Windsurf up -->
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">Windsurf Memories / Rules</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Workspace memory</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Rules + automatic memory</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Moderate structure</text>
  </g>

  <!-- Top Mid: Repo Persistent -->
  <g transform="translate(710, 260)">
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">GitHub Copilot Memory</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Repository Context</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Long-lived repository context</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Platform leverage</text>
  </g>

  <!-- Bottom Left: General Layer -->
  <g transform="translate(160, 680)">
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">Mem0</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Generic Infrastructure</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Semantic recall</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Cross-session memory</text>
  </g>

  <!-- Bottom Mid: Stateful agentss -->
  <g transform="translate(640, 600)">
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">Letta / MemGPT</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Stateful agents</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Layered memory</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Agent OS-style architecture</text>
  </g>

  <g transform="translate(920, 620)"> <!-- Moved Hindsight up and right -->
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">Hindsight</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Learning memory</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Experience distillation</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Beyond simple recall</text>
  </g>

  <!-- Bottom Right: Knowledge Graph -->
  <g transform="translate(1085, 735)"> <!-- Kept left of Graphiti -->
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">Cognee</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Graph + vector engine</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Relationship modeling</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Knowledge engine</text>
  </g>

  <g transform="translate(1320, 590)"> <!-- Moved further right -->
    <rect width="270" height="136" rx="12" fill="#111421" stroke="#1E293B" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#E2E8F0">Graphiti</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Temporal graph</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• Provenance tracking</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">• High structure</text>
  </g>

  <!-- Highlight: ArchSpine -->
  <g transform="translate(1120, 190)">
    <rect width="360" height="160" rx="12" fill="#171033" stroke="#8B5CF6" stroke-width="2.5" filter="url(#archspine-glow)"/>
    <rect width="360" height="160" rx="12" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.2"/>
    <text x="24" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#F5F3FF">ArchSpine</text>
    <text x="24" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#C4B5FD">• Structural codebase representation</text>
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#C4B5FD">• Architectural boundaries &amp; maps</text>
    <text x="24" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#C4B5FD">• Evolution &amp; semantic consistency</text>
    <text x="24" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#C4B5FD">• Human-Agent shared understanding</text>
  </g>

<?xml version="1.0" standalone="no"?>
<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#161B22" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>

    <!-- ArchSpine layer glow -->
    <filter id="archspine-glow" x="-5%" y="-15%" width="110%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#A371F7" flood-opacity="0.15"/>
    </filter>

    <!-- ArchSpine badge glow -->
    <filter id="badge-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#A371F7" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="#0D1117"/>
  <rect width="1600" height="1000" fill="url(#bg-glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="200" x2="1600" y2="200" stroke="#8B949E" stroke-width="1"/>
    <line x1="0" y1="400" x2="1600" y2="400" stroke="#8B949E" stroke-width="1"/>
    <line x1="0" y1="600" x2="1600" y2="600" stroke="#8B949E" stroke-width="1"/>
    <line x1="0" y1="800" x2="1600" y2="800" stroke="#8B949E" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="800" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#F0F6FC" letter-spacing="-0.02em">How Many Layers Does an AI Agent Need to Understand Your Code?</text>
  <text x="800" y="85" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="#8B949E">Each layer solves a different problem — ArchSpine fills the structured architecture layer others don't, coexisting rather than competing</text>

  <!-- Main container -->
  <rect x="80" y="120" width="1440" height="750" rx="16" fill="#0D1117" stroke="#21262D" stroke-width="1.5"/>

  <!-- ============================================ -->
  <!-- LAYER 1: Behavioral Instructions -->
  <!-- ============================================ -->
  <g opacity="0.85">
    <rect x="120" y="148" width="1360" height="138" rx="10" fill="#161B22" stroke="#21262D" stroke-width="1"/>

    <!-- Left accent bar -->
    <rect x="120" y="148" width="6" height="138" rx="3" fill="#58A6FF"/>

    <!-- Layer number badge -->
    <rect x="150" y="164" width="28" height="28" rx="6" fill="#58A6FF" opacity="0.12"/>
    <text x="164" y="183" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#58A6FF">1</text>

    <text x="190" y="183" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#E6EDF3">Behavioral Instructions Layer</text>
    <text x="190" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#6E7681">Project-level agent instructions</text>

    <line x1="420" y1="154" x2="420" y2="280" stroke="#21262D" stroke-width="1"/>

    <rect x="448" y="163" width="108" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="502" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79C0FF">CLAUDE.md</text>

    <rect x="564" y="163" width="108" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="618" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79C0FF">AGENTS.md</text>

    <rect x="680" y="163" width="112" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="736" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79C0FF">Memory Files</text>

    <text x="448" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#C9D1D9">Tells the agent HOW to behave — development conventions, coding style, preferences</text>

    <text x="448" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#6E7681">
      <tspan font-weight="600" fill="#8B949E">Scope</tspan>
      <tspan> — Guides behavior but does not verify whether code actually follows the instructions</tspan>
    </text>
  </g>

  <!-- Gap connector 1 → 2 -->
  <g opacity="0.4">
    <line x1="800" y1="286" x2="800" y2="306" stroke="#30363D" stroke-width="1.5"/>
    <path d="M 793,300 L 800,308 L 807,300" stroke="#30363D" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 2: Repository Context -->
  <!-- ============================================ -->
  <g opacity="0.85">
    <rect x="120" y="314" width="1360" height="138" rx="10" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="120" y="314" width="6" height="138" rx="3" fill="#39D2C0"/>

    <rect x="150" y="330" width="28" height="28" rx="6" fill="#39D2C0" opacity="0.12"/>
    <text x="164" y="349" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#39D2C0">2</text>

    <text x="190" y="349" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#E6EDF3">Repository Context Layer</text>
    <text x="190" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#6E7681">Persistent project context</text>

    <line x1="420" y1="320" x2="420" y2="446" stroke="#21262D" stroke-width="1"/>

    <rect x="448" y="329" width="140" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="518" y="346" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#56D364">Copilot Memory</text>

    <rect x="596" y="329" width="130" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="661" y="346" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#56D364">Windsurf Rules</text>

    <rect x="734" y="329" width="100" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="784" y="346" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#56D364">Platform Mem</text>

    <text x="448" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#C9D1D9">Provides project-level persistent context so agents remember across sessions</text>

    <text x="448" y="412" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#6E7681">
      <tspan font-weight="600" fill="#8B949E">Scope</tspan>
      <tspan> — Manually maintained, easily outdated; no binding with actual code structure</tspan>
    </text>
  </g>

  <!-- Gap connector 2 → 3 -->
  <g opacity="0.4">
    <line x1="800" y1="452" x2="800" y2="472" stroke="#30363D" stroke-width="1.5"/>
    <path d="M 793,466 L 800,474 L 807,466" stroke="#30363D" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 3: Structured Architecture Layer ← ArchSpine -->
  <!-- ============================================ -->
  <g transform="translate(0,0)">
    <!-- Glow underlay -->
    <rect x="105" y="475" width="1390" height="195" rx="14" fill="#A371F7" opacity="0.06" filter="url(#archspine-glow)"/>

    <!-- Card bg -->
    <rect x="120" y="480" width="1360" height="180" rx="10" fill="#161B22" stroke="#A371F7" stroke-width="1.5"/>
    <rect x="120" y="480" width="1360" height="180" rx="10" fill="none" stroke="#BC8CFF" stroke-width="1" opacity="0.1"/>

    <!-- Left accent bar (thicker) -->
    <rect x="120" y="480" width="8" height="180" rx="3" fill="#A371F7"/>

    <rect x="150" y="496" width="28" height="28" rx="6" fill="#A371F7" opacity="0.18"/>
    <text x="164" y="515" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#BC8CFF">3</text>

    <text x="190" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#F0F6FC">Structured Architecture Layer</text>
    <text x="190" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#A371F7">Auto-extracted, git-native, verifiable</text>

    <!-- ArchSpine badge -->
    <rect x="190" y="560" width="120" height="28" rx="14" fill="#A371F7" filter="url(#badge-glow)"/>
    <text x="250" y="579" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#F0F6FC">ArchSpine</text>

    <line x1="420" y1="486" x2="420" y2="654" stroke="#A371F7" stroke-width="1" opacity="0.25"/>

    <!-- Capability tags -->
    <rect x="448" y="493" width="104" height="26" rx="6" fill="#A371F7" opacity="0.1" stroke="#BC8CFF" stroke-width="1"/>
    <text x="500" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#BC8CFF">Semantic Index</text>

    <rect x="560" y="493" width="104" height="26" rx="6" fill="#A371F7" opacity="0.1" stroke="#BC8CFF" stroke-width="1"/>
    <text x="612" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#BC8CFF">Knowledge Graph</text>

    <rect x="672" y="493" width="116" height="26" rx="6" fill="#A371F7" opacity="0.1" stroke="#BC8CFF" stroke-width="1"/>
    <text x="730" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#BC8CFF">Architecture Rules</text>

    <rect x="796" y="493" width="74" height="26" rx="6" fill="#A371F7" opacity="0.1" stroke="#BC8CFF" stroke-width="1"/>
    <text x="833" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#BC8CFF">Views</text>

    <rect x="878" y="493" width="96" height="26" rx="6" fill="#A371F7" opacity="0.1" stroke="#BC8CFF" stroke-width="1"/>
    <text x="926" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#BC8CFF">MCP Tools</text>

    <rect x="982" y="493" width="106" height="26" rx="6" fill="#A371F7" opacity="0.1" stroke="#BC8CFF" stroke-width="1"/>
    <text x="1035" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#BC8CFF">Diagnostics</text>

    <!-- Differentiator lines -->
    <text x="448" y="546" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#D2D8E0">
      <tspan font-weight="700" fill="#BC8CFF">Auto-built, code as ground truth</tspan>
      <tspan> — AST extracts semantic index + knowledge graph; agents query via 21 MCP tools</tspan>
    </text>
    <text x="448" y="574" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#D2D8E0">
      <tspan font-weight="700" fill="#BC8CFF">Git-native, commit-as-distribution</tspan>
      <tspan> — </tspan>
      <tspan font-family="monospace" fill="#A371F7">.spine/</tspan>
      <tspan> versioned with repo, </tspan>
      <tspan font-family="monospace" fill="#A371F7">spine sync</tspan>
      <tspan> refreshes everything, rules are reviewable and enforceable</tspan>
    </text>
    <text x="448" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#D2D8E0">
      <tspan font-weight="700" fill="#BC8CFF">Local-first, your data stays yours</tspan>
      <tspan> — control plane lives in your repo, no external services, full understanding on clone</tspan>
    </text>

    <!-- Scope -->
    <text x="448" y="632" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#6E7681">
      <tspan font-weight="600" fill="#8B949E">Scope</tspan>
      <tspan> — Fills the missing "code structure → machine-readable semantics" layer, coexisting with others above and below</tspan>
    </text>
  </g>

  <!-- Gap connector 3 → 4 -->
  <g opacity="0.4">
    <line x1="800" y1="660" x2="800" y2="682" stroke="#30363D" stroke-width="1.5"/>
    <path d="M 793,676 L 800,684 L 807,676" stroke="#30363D" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============================================ -->
  <!-- LAYER 4: General Memory Infrastructure -->
  <!-- ============================================ -->
  <g opacity="0.85">
    <rect x="120" y="690" width="1360" height="138" rx="10" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect x="120" y="690" width="6" height="138" rx="3" fill="#8B949E"/>

    <rect x="150" y="706" width="28" height="28" rx="6" fill="#8B949E" opacity="0.12"/>
    <text x="164" y="725" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#8B949E">4</text>

    <text x="190" y="725" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#E6EDF3">General Memory Infrastructure</text>
    <text x="190" y="750" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#6E7681">Cross-session memory, vector recall, graph storage</text>

    <line x1="420" y1="696" x2="420" y2="822" stroke="#21262D" stroke-width="1"/>

    <rect x="448" y="705" width="64" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="480" y="722" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B949E">Mem0</text>

    <rect x="520" y="705" width="72" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="556" y="722" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B949E">Letta</text>

    <rect x="600" y="705" width="80" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="640" y="722" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B949E">Graphiti</text>

    <rect x="688" y="705" width="72" height="26" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="724" y="722" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B949E">Cognee</text>

    <text x="448" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#C9D1D9">Cross-session memory, knowledge graph storage, vector recall, and other general-purpose infrastructure</text>

    <text x="448" y="788" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#6E7681">
      <tspan font-weight="600" fill="#8B949E">Scope</tspan>
      <tspan> — General memory layer, no direct binding to the current repository's code structure</tspan>
    </text>
  </g>

  <!-- Footer note -->
  <text x="800" y="908" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#6E7681">
    All four layers can coexist — ArchSpine doesn't replace any layer. It fills the missing "code structure → machine-readable semantics" gap
  </text>
</svg>

# 🏷️ 命名规范规则 (Naming Convention Rules)
# 
# 保持 codebase 风格统一，尤其是在庞大的 monorepo 中。

- [Rule: Interface Prefix]
  - Scope: src/types/**/*.ts
  - Constraint: Internal interfaces must start with the character 'I'. (Example: IUserRepository)
  - Severity: Warning
  - Reason: Consistent interface naming helps differentiate interfaces from types and classes.

- [Rule: Test File Suffix]
  - Scope: tests/**
  - Constraint: Test files must end with .test.ts or .spec.ts
  - Severity: Error
  - Reason: Consistency in matching test runners.
